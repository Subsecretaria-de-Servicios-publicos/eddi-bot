version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: rag_eddi_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: rag_eddi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - rag_eddi_postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: rag_eddi_web
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  nginx:
    image: nginx:stable
    container_name: rag_eddi_nginx
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  rag_eddi_postgres_data: