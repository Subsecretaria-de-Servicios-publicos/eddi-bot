{% extends "base.html" %}
{% block content %}
<div class="admin-shell narrow">
  <div class="admin-topbar">
    <div>
      <h1>Nueva fuente</h1>
      <p>Configuración base para discovery e ingesta</p>
    </div>
    <div class="admin-actions">
      <a class="btn btn-secondary" href="/rag/admin/sources">Volver</a>
    </div>
  </div>

  <form class="admin-form-card" method="post" action="/rag/admin/sources/new">
    <div class="form-grid">
      <div class="field field-span-2">
        <label>Nombre</label>
        <input type="text" name="name" required>
      </div>

      <div class="field field-span-2">
        <label>Base URL</label>
        <input type="text" name="base_url" placeholder="https://...">
      </div>

      <div class="field">
        <label>Tipo de fuente</label>
        <select name="source_kind">
          <option value="website">website</option>
          <option value="pdf">pdf</option>
          <option value="faq">faq</option>
          <option value="manual">manual</option>
          <option value="api">api</option>
        </select>
      </div>

      <div class="field">
        <label>Activa</label>
        <select name="is_active">
          <option value="true" selected>Sí</option>
          <option value="false">No</option>
        </select>
      </div>

      <div class="field field-span-2">
        <label>Discovery config JSON</label>
        <textarea name="discovery_config_json" rows="10">{"allowed_prefixes": [], "allowed_extensions": ["html", "pdf"]}</textarea>
      </div>
    </div>

    <div class="form-actions">
      <a class="btn btn-secondary" href="/rag/admin/sources">Cancelar</a>
      <button class="btn btn-primary" type="submit">Guardar fuente</button>
    </div>
  </form>
</div>
{% endblock %}
