{% extends "base.html" %}

{% block title %}Acceso administrador | RAG eddi{% endblock %}

{% block content %}
<div class="login-shell">
  <div class="login-card">
    <div class="login-brand">
      <img
        src="/static/brand/eddi/logo-eddi-hyvai.png"
        alt="Eddi HyV.ai"
      >
      <div>
        <h1>Acceso administrador</h1>
      </div>
    </div>

    <form method="post" action="/rag/admin/login" class="login-form" autocomplete="off">
      <input type="text" name="fake_username" style="display:none" autocomplete="username">
      <input type="password" name="fake_password" style="display:none" autocomplete="new-password">

      <div class="field">
        <label for="username">Usuario</label>
        <input
          id="username"
          type="text"
          name="username"
          value=""
          placeholder="Ingresá tu usuario"
          autocomplete="off"
          autocapitalize="off"
          autocorrect="off"
          spellcheck="false"
          required
        >
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          name="password"
          value=""
          placeholder="Ingresá tu contraseña"
          autocomplete="new-password"
          autocapitalize="off"
          autocorrect="off"
          spellcheck="false"
          required
        >
      </div>

      {% if error %}
      <div class="alert-error">{{ error }}</div>
      {% endif %}

      <button class="btn btn-primary login-btn" type="submit">Ingresar</button>
    </form>
  </div>
</div>
{% endblock %}
