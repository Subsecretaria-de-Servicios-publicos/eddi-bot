{% extends "base.html" %}

{% block title %}eddi{% endblock %}

{% block content %}
<div class="chat-page">
  <div class="chat-shell">

    <section class="chat-topbar-red">
      <div class="chat-topbar-brand">
        <img
          src="/static/brand/eddi/logo-eddi-hyvai.png"
          alt="EDDI HyV.ai"
          class="chat-topbar-logo"
        >
        <div class="chat-topbar-text">
          <strong>eddibot</strong>
          <span>Asistente documental inteligente</span>
        </div>
      </div>

      <div class="chat-topbar-status">
        <span class="chat-status-badge-red">
          <span class="dot"></span>
          Activo
        </span>
      </div>
    </section>

    <section class="chat-layout">

      <main class="chat-main" style="width:100%;">
        <div id="chat-messages" class="chat-messages">
          <div class="msg-row assistant">
            <div class="msg-bubble assistant-bubble">
              <div class="msg-role">eddibot</div>
              <div class="msg-text">
                Hola soy eddibot! Podés consultar libremente
                cualquier información tecnica relevante de la plataforma eddi.
                <ul>

              </div>
            </div>
          </div>
        </div>

        <div class="chat-compose">
          <div class="compose-input-wrap">
            <textarea
              id="chat-input"
              rows="2"
              placeholder="Escribí tu consulta..."
              required
            ></textarea>
          </div>

          <button id="chat-send" type="button" class="compose-send-btn">Enviar</button>
        </div>

        <div id="chat-sources" class="chat-sources"></div>
      </main>

    </section>
  </div>
</div>

<style>
  .chat-layout {
    display: flex;
    flex-direction: row;
    /* Elimina el espacio reservado para el aside */
  }
  .chat-main {
    flex: 1 1 100%;
    width: 100%;
    max-width: 100%;
  }
  /* Puedes eliminar o comentar cualquier regla relacionada con .chat-sidebar */
  /* ...el resto del CSS igual... */
  .source-pdf-item {
    margin-bottom: 8px;
  }

  .source-pdf-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    font-weight: 600;
  }

  .source-pdf-badge {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 999px;
    background: #b80f1f;
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    line-height: 1;
  }

  .source-pdf-name {
    text-decoration: underline;
  }
</style>

<script>
  const messagesEl = document.getElementById("chat-messages");
  const inputEl = document.getElementById("chat-input");
  const sendEl = document.getElementById("chat-send");
  const sourcesEl = document.getElementById("chat-sources");

  let sessionKey = localStorage.getItem("eddi_session_key") || "";
  let sending = false;

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function escapeHtml(value) {
    return String(value || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function addMessage(role, text) {
    const row = document.createElement("div");
    row.className = `msg-row ${role === "user" ? "user" : "assistant"}`;

    const bubble = document.createElement("div");
    bubble.className = `msg-bubble ${role === "user" ? "user-bubble" : "assistant-bubble"}`;

    const roleEl = document.createElement("div");
    roleEl.className = "msg-role";
    roleEl.textContent = role === "user" ? "VOS" : "EDDI";

    const textEl = document.createElement("div");
    textEl.className = "msg-text";
    textEl.innerHTML = escapeHtml(text).replace(/\n/g, "<br>");

    bubble.appendChild(roleEl);
    bubble.appendChild(textEl);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollToBottom();

    return row;
  }

  function dedupeSources(sources) {
    const seen = new Set();
    const out = [];

    for (const src of sources || []) {
      const key = [
        src.document_id || "",
        src.content_kind || "",
        src.page_number || "",
        src.image_path || "",
        src.url || ""
      ].join("|");

      if (seen.has(key)) continue;
      seen.add(key);
      out.push(src);
    }

    return out;
  }

  function pickCompactSources(sources) {
    const filtered = [];

    for (const src of sources || []) {
      if (src.content_kind === "image_ocr") {
        continue;
      }
      filtered.push(src);
    }

    return filtered.slice(0, 3);
  }

  function renderSources(sources) {
    sourcesEl.innerHTML = "";

    if (!sources || !sources.length) return;

    const normalized = dedupeSources(sources);
    const compactSources = pickCompactSources(normalized);

    const title = document.createElement("div");
    title.className = "sources-title";
    title.textContent = "Fuentes consultadas";
    sourcesEl.appendChild(title);

    if (compactSources.length) {
      const list = document.createElement("div");
      list.className = "sources-compact-list";

      compactSources.forEach(src => {
        const item = document.createElement("div");
        item.className = "source-item compact source-pdf-item";

        item.innerHTML = `
          <div class="source-head">
            <div class="source-title">
              ${
                src.url
                  ? `
                    <a href="${escapeHtml(src.url)}" target="_blank" rel="noopener noreferrer" class="source-pdf-link">
                      <span class="source-pdf-badge">PDF</span>
                      <span class="source-pdf-name">${escapeHtml(src.title || "Abrir PDF")}</span>
                    </a>
                  `
                  : `${escapeHtml(src.title || "Documento")}`
              }
            </div>
          </div>
        `;

        list.appendChild(item);
      });

      sourcesEl.appendChild(list);
    }
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || sending) return;

    sending = true;
    sendEl.disabled = true;

    addMessage("user", text);
    inputEl.value = "";
    sourcesEl.innerHTML = "";

    const loadingNode = addMessage("assistant", "Procesando consulta...");

    try {
      const response = await fetch("/rag/eddi/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          message: text,
          session_key: sessionKey || null,
          channel: "web",
          document_type: null,
          organism: null,
          topic: null
        })
      });

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }

      const data = await response.json();

      sessionKey = data.session_key || sessionKey;
      localStorage.setItem("eddi_session_key", sessionKey);

      loadingNode.remove();
      addMessage("assistant", data.answer || "No se pudo generar una respuesta.");
      renderSources(data.sources || []);
    } catch (err) {
      loadingNode.remove();
      addMessage("assistant", "Ocurrió un error al procesar tu consulta.");
      console.error("Chat error:", err);
    } finally {
      sending = false;
      sendEl.disabled = false;
      inputEl.focus();
    }
  }

  sendEl.addEventListener("click", sendMessage);

  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
</script>
{% endblock %}
